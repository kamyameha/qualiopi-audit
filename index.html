<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="Préparation et suivi des audits Qualiopi de Formation Entre-Deux.">
  <title>Formation Entre-Deux — Suivi Qualiopi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/main.css?v=1.0.1">
  <link rel="stylesheet" href="css/site-alignment.css?v=1.0.1">
  <link rel="stylesheet" href="css/audit-ui.css?v=1.0.1">
</head>
<body>
  <header class="entete">
    <button class="logo-bouton" id="retourAccueil" aria-label="Retour à l’accueil des audits"><img src="assets/logo-entre-deux.png" alt="Formation Entre-Deux"></button>
    <div class="entete-actions" id="actionsEntete"><button class="bouton principal" id="nouvelAudit">Créer un audit</button></div>
  </header>
  <main id="application"></main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="mise-a-jour" id="miseAJour" hidden><span>Une nouvelle version est disponible.</span><button id="actualiserApplication">Actualiser</button></div>
  <dialog id="dialogueAudit" class="dialogue">
    <form id="formulaireAudit">
      <div class="dialogue-entete"><div><p class="sur-titre" id="libelleDialogue">Nouvel audit</p><h2 id="titreDialogue">Créer un audit</h2></div><button class="icone-bouton" type="button" id="fermerDialogue" aria-label="Fermer">×</button></div>
      <input type="hidden" name="auditId">
      <label>Nom de l’audit<input name="nom" required placeholder="Audit 2026"></label>
      <label>Date de l’audit<input name="date" type="date"></label>
      <label>Type d’audit<select name="type"><option>Audit initial</option><option selected>Audit de surveillance</option><option>Audit de renouvellement</option></select></label>
      <label>Responsable de l’audit<input name="responsable" required placeholder="Ex. Betty"></label>
      <div class="dialogue-actions"><button class="bouton principal" type="submit" id="enregistrerAudit">Créer l’audit</button></div>
    </form>
  </dialog>
  <dialog id="dialogueConnexion" class="dialogue dialogue-auth">
    <a class="logo-bouton logo-connexion" href="https://formationentredeux.com/" aria-label="Visiter le site Formation Entre-Deux"><img src="assets/logo-entre-deux.png" alt="Formation Entre-Deux"></a>
    <form id="formulaireConnexion">
      <div class="dialogue-entete"><div><h2>Connexion</h2><p>Accédez à vos audits Qualiopi sécurisés.</p></div></div>
      <label>Adresse email<input name="email" type="email" autocomplete="email" required autofocus placeholder="vous@exemple.fr"></label>
      <label>Mot de passe<input name="password" type="password" autocomplete="current-password" minlength="8" required placeholder="8 caractères minimum"></label>
      <div class="dialogue-actions auth-actions">
        <button class="bouton principal" type="submit" name="action" value="signin">Se connecter</button>
        <button class="bouton secondaire" type="submit" name="action" value="signup">Créer mon accès</button>
      </div>
      <p class="message-auth" id="messageAuth" role="status" aria-live="polite"></p>
    </form>
  </dialog>
  <dialog id="dialoguePartage" class="dialogue">
    <form id="formulairePartage">
      <div class="dialogue-entete"><div><h2>Partager l’audit</h2><p>Invitez un lecteur externe. Son accès sera limité à cet audit.</p></div><button class="icone-bouton" type="button" id="fermerPartage" aria-label="Fermer">×</button></div>
      <label>Adresse email externe<input name="email" type="email" required placeholder="auditeur@exemple.fr"></label>
      <div class="dialogue-actions"><button class="bouton principal">Créer l’invitation</button></div>
    </form>
  </dialog>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-service.js?v=1.0.1"></script>
  <script src="js/version.js?v=1.0.1"></script>
  <script src="js/app.js?v=1.0.1"></script>
  <script src="js/service-worker.js?v=1.0.1"></script>
</body>
</html>
